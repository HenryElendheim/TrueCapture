name: Build APK

on:
  push:
    branches:
      - Testing
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build the debug APK
        run: ./gradlew assembleDebug

      - name: Name the APK
        run: cp app/build/outputs/apk/debug/app-debug.apk ElendheimCapture.apk

      - name: Upload the APK
        uses: actions/upload-artifact@v4
        with:
          name: ElendheimCapture-apk
          path: ElendheimCapture.apk

      - name: Publish to the latest release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          files: ElendheimCapture.apk
