name: Build APK

on:
  push:
    branches:
      - Testing
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version tag to publish (e.g. v1.0). Leave blank for none.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build the debug APK
        run: ./gradlew assembleDebug

      - name: Name the APK
        run: cp app/build/outputs/apk/debug/app-debug.apk ElendheimCapture.apk

      - name: Upload the APK
        uses: actions/upload-artifact@v4
        with:
          name: ElendheimCapture-apk
          path: ElendheimCapture.apk

      - name: Remove the old TrueCapture APK from the release
        if: github.ref == 'refs/heads/main'
        run: gh release delete-asset latest TrueCapture.apk --yes || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Publish to the latest release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          body: |
            Elendheim Capture is a simple camera for Android.
            It takes photos, records video, and saves them straight to your gallery.
          files: ElendheimCapture.apk

      - name: Publish a versioned release
        if: github.event_name == 'workflow_dispatch' && inputs.version != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: Elendheim Capture ${{ inputs.version }}
          target_commitish: ${{ github.sha }}
          body: |
            Elendheim Capture is a simple camera for Android.
            It takes photos, records video, and saves them straight to your gallery.
          files: ElendheimCapture.apk
